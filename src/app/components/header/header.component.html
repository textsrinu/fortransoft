<header class="header">
  <div class="container">
    <div class="nav-wrapper">
      <div class="logo">
        <a routerLink="/" (click)="closeMobileMenu()">
          <span class="logo-text">FortranSoft</span>
        </a>
      </div>

      <button class="mobile-toggle" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" [class.open]="isMobileMenuOpen()">
        <ul class="nav-list">
          <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()">Home</a></li>
          <li><a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a></li>
          <li><a routerLink="/portfolio" routerLinkActive="active" (click)="closeMobileMenu()">Portfolio</a></li>        
          <li><a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a></li>
          <li><a routerLink="/contact" routerLinkActive="active" class="btn-contact" (click)="closeMobileMenu()">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
