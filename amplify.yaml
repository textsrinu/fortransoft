version: 1
build:
  images:
    backend:
      image: amazonlinux:2023
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/fortransoft
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
